syntax = "proto3";
package kratos.api;

option go_package = "monster/internal/conf;conf";

message Bootstrap {
  Server server = 1;
  Data data = 2;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    int64 timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    int64 timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    int64 read_timeout = 3;
    int64 write_timeout = 4;
    string password = 5;
    int32 database = 6;
  }
  Database database = 1;
  Redis redis = 2;
}
